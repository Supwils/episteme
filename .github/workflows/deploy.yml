name: Deploy to Vercel (production)

# Why this exists instead of Vercel's native git integration:
# Vercel's git-integration deploy step rejects the serverless-function *dedup symlinks* that
# Next.js's own Vercel builder produces for this app ("invalid deployment package ... files in
# symlinked directories"). That validation is skipped by the `--prebuilt` deploy path, and
# `--archive=tgz` additionally bypasses the 15,000-file upload limit. So we build the Vercel
# Build Output here and ship it via the prebuilt + archive path — the only route proven to work.
# Native git auto-deploy is turned off in vercel.json (git.deploymentEnabled.main = false).
#
# One-time setup: add a Vercel token as the repo secret VERCEL_TOKEN
#   (Vercel dashboard -> Account Settings -> Tokens -> Create, scope: this team).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_ds5C6k3BjI7cH3mPthTVu53v
  VERCEL_PROJECT_ID: prj_tjMBARDNE97j5MXMaApXQ5zZtbXi

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel output (runs prebuild gen-all + next build)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output (archive bypasses the 15000-file limit + symlink validation)
        run: vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
