name: CI

on:
  push:
    branches: [main]
    # Doc-only changes (docs/ is dev-only, .vercelignore'd) don't need a build or redeploy.
    paths-ignore:
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Content · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generated indexes are current
        run: |
          pnpm gen-all
          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            git diff --exit-code
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Content and knowledge integrity
        run: |
          pnpm check-content
          pnpm audit-graph-coverage
          pnpm audit-learning-continuum
          pnpm audit-subject-candidates
          pnpm audit-linguistics-foundation

      - name: Unit tests
        run: pnpm test

  build:
    name: Build · Bundle budget
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `build` runs the `prebuild` hook (gen-all) first, so the search
      # mirrors are always regenerated from content before bundling.
      - name: Build
        run: pnpm build

      - name: SSG and ISR strategy
        run: pnpm audit-rendering

      # Enforce the JS gzip budget documented in CLAUDE.md §6.
      - name: Bundle budget
        run: pnpm bundle-check -- --skip-build

      - name: Lighthouse performance budget
        run: |
          pnpm start > /tmp/episteme-next.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          for attempt in {1..30}; do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat /tmp/episteme-next.log
              exit 1
            fi
            if curl --fail --silent http://127.0.0.1:3000 > /dev/null; then
              break
            fi
            if [ "$attempt" = 30 ]; then
              cat /tmp/episteme-next.log
              exit 1
            fi
            sleep 1
          done
          LH_BASE=http://127.0.0.1:3000 pnpm lighthouse

  # Deploy ONLY after quality + build both pass, and only on main (never on PRs).
  # Native Vercel git-integration is disabled (vercel.json git.deploymentEnabled.main=false)
  # because its deploy step rejects Next's serverless-function dedup symlinks. We deploy via
  # the prebuilt + archive path — the only reliable route. Requires repo secret VERCEL_TOKEN.
  deploy:
    name: Deploy to Vercel (production)
    needs: [quality, build]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: team_ds5C6k3BjI7cH3mPthTVu53v
      VERCEL_PROJECT_ID: prj_tjMBARDNE97j5MXMaApXQ5zZtbXi
      VERCEL_CLI_VERSION: 56.2.1
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Vercel CLI
        run: npm i -g "vercel@$VERCEL_CLI_VERSION"

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel output (Turbopack, via pnpm build)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output (archive bypasses 15000-file limit + symlink validation)
        run: vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
